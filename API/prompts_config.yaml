# 系统场景提示词

prompts:
  investigation_scenario:
    name: "调查场景扩展"
    description: "针对主机安全与系统状态调查的扩展提示，包含调查目标、重点领域和优先级"
    usage: "调查功能"
    content: |
      ## 调查场景：主机安全与系统状态调查

      ### 调查目标
      1. 分析主机系统状态与健康状况
      2. 识别潜在安全风险与异常
      3. 收集关键系统信息用于诊断

      ### 重点关注领域

      #### 1. 系统状态监测
      - CPU、内存、磁盘使用率
      - 系统负载与运行时间
      - 服务状态与依赖关系

      #### 2. 安全风险检测
      - 异常进程与可疑活动
      - 未授权网络连接
      - 权限配置问题
      - 敏感文件访问记录

      #### 3. 配置审计
      - 用户账户与权限
      - 防火墙规则
      - 系统服务配置
      - 计划任务与启动项

      ### 调查优先级
      1. **紧急**：发现中的攻击活动、系统崩溃风险
      2. **高**：已知漏洞、配置错误、未授权访问
      3. **中**：性能问题、异常日志、可疑行为
      4. **低**：信息收集、基线对比、常规审计

      ### 输出要求
      - 发现的问题需附带证据（代码执行结果）
      - 风险评级与影响分析
      - 修复建议与具体步骤
      - 预防措施推荐

      ### 特殊注意事项
      1. 调查操作应最小化对系统影响
      2. 敏感信息（如密码、密钥）需脱敏处理
      3. 批量操作需考虑系统负载
      4. 保持调查过程的可重复性


