# DeepAnalyze 配置文件
# 包含所有系统配置和提示词配置

# API 配置
api:
  # DeepSeek API 端点
  base: "https://api.deepseek.com/v1"
  # 模型路径
  model_path: "deepseek-chat"
  # DeepSeek API Key
  api_key: "sk-5d5a490fa3c1476f922aa07472bc6177"

# ============================================================
# DeepInvestigate v2.0 新增配置
# ============================================================

# Redis Stack 配置（长期记忆）
redis:
  host: "localhost"
  port: 6379
  db: 0
  password: ""
  # 工作记忆 TTL（秒）
  working_memory_ttl: 1800
  # 情景记忆向量索引名
  episodic_index: "em_idx"

# ChromaDB 配置（RAG 知识库）
chroma:
  host: "localhost"
  port: 8000
  collection: "knowledge_base"
  # 检索默认 top_k
  default_top_k: 5

# Embedding 模型配置
embedder:
  # provider 可选: huggingface / openai
  provider: "openai"
  # huggingface: BAAI/bge-m3 等；openai: text-embedding-3-small / text-embedding-3-large
  model: "text-embedding-3-small"
  device: "cpu"
  dim: 1536                       # openai small=1536 / large=3072 / bge-m3=1024
  batch_size: 32
  # 仅 openai provider 使用（独立于 LLM 的 api_base/api_key）
  api_base: "https://jeniya.top/v1"
  api_key: "sk-dB2j9ev4JlTBOQkZhfvUpfcXaMokhXuEsyI1HmeM9YFsf3TH"

# LangSmith 可观测性配置
langsmith:
  enabled: false              # 上线后改为 true
  project: "DeepInvestigate-Dev"
  api_key: ""                 # 从 https://smith.langchain.com 获取
  endpoint: "https://api.smith.langchain.com"

# ============================================================
# DeepInvestigate v3.0 新增配置
# ============================================================

# 多模型路由配置
models:
  tiers:
    high:
      primary: "deepseek-chat"
      fallback: ""
    medium:
      primary: "deepseek-chat"
      fallback: ""
    low:
      primary: "deepseek-chat"
      fallback: ""
  providers:
    deepseek:
      api_key: "sk-5d5a490fa3c1476f922aa07472bc6177"
      base_url: "https://api.deepseek.com/v1"
      models:
        - "deepseek-chat"
    openai:
      api_key: ""
      base_url: "https://api.openai.com/v1"
      models:
        - "gpt-4o-mini"

# MCP 配置
mcp:
  enabled: false
  servers:
    - name: "local-tools"
      transport: "stdio"
      command: "python"
      args: ["-m", "API.mcp.server"]

# HITL 配置
hitl:
  enabled: true
  risk_levels:
    "0": ["rag_search", "recall_memory", "list_files", "read_file"]
    "1": ["run_python", "write_file", "web_search"]
    "2": ["query_logs", "search_cve"]

# Guardrails 配置
guardrails:
  input:
    enabled: true
    blocked_patterns: []
  output:
    pii_masking: true
    safety_scan: true

# Checkpointing 配置
checkpoint:
  db_path: "data/checkpoints.db"
  ttl_days: 7

# Agent 编排配置
agent:
  max_iterations: 15          # 单次任务最大轮数
  recursion_limit: 25         # LangGraph 递归上限
  default_temperature: 0.4
  planner_temperature: 0.3
  investigator_temperature: 0.4
  reporter_temperature: 0.5
  # 是否启用各能力（便于灰度）
  enable_memory: true
  enable_rag: true
  enable_multi_agent: true

# 工具配置
tools:
  code_executor:
    timeout: 120              # 秒
    memory_limit_mb: 512      # 内存上限
    network_disabled: true    # 默认禁网
  web_search:
    enabled: false
    api_key: ""

# 系统提示词配置
prompts:
  investigation_scenario:
    name: "调查场景扩展"
    description: "针对主机安全与系统状态调查的扩展提示，包含调查目标、重点领域和优先级"
    usage: "调查功能"
    content: |
      ## 调查场景：主机安全与系统状态调查与分析、攻击分析

      ### 调查目标
      1. 分析主机系统状态与健康状况
      2. 识别潜在安全风险与异常
      3. 收集关键系统信息用于诊断

      ### 重点关注领域

      #### 1. 系统状态监测
      - CPU、内存、磁盘使用率
      - 系统负载与运行时间
      - 服务状态与依赖关系

      #### 2. 安全风险检测
      - 异常进程与可疑活动
      - 未授权网络连接
      - 权限配置问题
      - 敏感文件访问记录

      #### 3. 配置审计
      - 用户账户与权限
      - 防火墙规则
      - 系统服务配置
      - 计划任务与启动项

      ### 调查优先级
      1. **紧急**：发现中的攻击活动、系统崩溃风险
      2. **高**：已知漏洞、配置错误、未授权访问
      3. **中**：性能问题、异常日志、可疑行为
      4. **低**：信息收集、基线对比、常规审计

      ### 输出要求
      - 发现的问题需附带证据（代码执行结果）
      - 风险评级与影响分析
      - 修复建议与具体步骤
      - 预防措施推荐

      ### 特殊注意事项
      1. 调查操作应最小化对系统影响
      2. 敏感信息（如密码、密钥）需脱敏处理
      3. 批量操作需考虑系统负载
      4. 保持调查过程的可重复性
  report_prompt:
    name: "报告撰写提示词"
    description: "用于指导大模型撰写详细的对话报告"
    usage: "报告撰写功能"
    content: |
      你是一名专业的技术文档撰写专家，擅长将技术对话转化为结构清晰、内容全面的报告。

      请根据提供的对话历史和生成的报告文件，撰写一份详细的综合报告。报告应包含以下内容：

      1. **执行摘要**：简要总结整个对话的主要内容和结论
      2. **任务目标**：描述用户的初始问题和需求
      3. **分析过程**：详细记录对话中的分析步骤和关键发现
      4. **分析结果**：总结提出的解决方案和实施步骤
      5. **结论与建议**：提供最终结论和后续建议

      报告应结构清晰，逻辑连贯，语言专业但易于理解。请确保报告内容全面覆盖对话中的所有重要信息，并保持客观中立的语气。
