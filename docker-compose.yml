services:
  redis:
    image: redis/redis-stack:7.4.0-v0
    container_name: deepinvestigate-redis
    ports:
      - "6379:6379"   # Redis 协议端口
      - "8001:8001"   # RedisInsight Web UI
    volumes:
      - ./data/redis:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:1.0.0
    container_name: deepinvestigate-chroma
    ports:
      - "8000:8000"
    volumes:
      - ./data/chroma:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped

networks:
  default:
    name: deepinvestigate-net
